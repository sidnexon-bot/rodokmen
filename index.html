<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rodokmen</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rodokmen" />
  <meta name="theme-color" content="#8B6F47" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg:#FAFAF8; --bg2:#F0EDE6; --card:#FFFFFF; --border:#E0D8CC;
      --text:#1A1A2E; --text2:#6B6470; --accent:#8B6F47; --accent2:#C4A882;
      --female:#C4748A; --male:#4A7FC1; --unknown:#8B8B8B;
      --shadow:0 2px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 32px rgba(0,0,0,.14);
      --tr:.22s ease; --panel:340px;
    }
    [data-theme="dark"] {
      --bg:#0F0F1A; --bg2:#1A1A2E; --card:#1E1E30; --border:#2E2E44;
      --text:#E8E0D0; --text2:#9A9090; --accent:#C4A882; --accent2:#8B6F47;
      --female:#D4849A; --male:#6A9FD1;
      --shadow:0 2px 12px rgba(0,0,0,.3); --shadow-lg:0 8px 32px rgba(0,0,0,.5);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background var(--tr),color var(--tr);}

    /* Login */
    #login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:32px;padding:24px;}
    #login-screen h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--accent);letter-spacing:-.5px;text-align:center;}
    #login-screen p{color:var(--text2);font-size:.95rem;text-align:center;max-width:320px;line-height:1.6;}
    .login-btn{display:flex;align-items:center;gap:12px;padding:14px 28px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;font-size:1rem;font-weight:500;color:var(--text);cursor:pointer;box-shadow:var(--shadow);transition:box-shadow var(--tr),transform var(--tr);}
    .login-btn:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
    #login-error{color:#c0392b;font-size:.88rem;}

    /* App */
    #app{display:none;height:100vh;flex-direction:column;}
    #app.visible{display:flex;}

    /* Topbar */
    #topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;border-bottom:1px solid var(--border);background:var(--card);box-shadow:var(--shadow);z-index:10;flex-shrink:0;}
    #topbar h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent);font-weight:600;}
    .spacer{flex:1;}
    .tb-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.82rem;font-weight:500;color:var(--text2);cursor:pointer;transition:border-color var(--tr),color var(--tr);white-space:nowrap;}
    .tb-btn:hover{border-color:var(--accent);color:var(--accent);}
    #search-wrap{position:relative;}
    #search-input{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:.88rem;width:200px;outline:none;transition:border-color var(--tr);}
    #search-input:focus{border-color:var(--accent);}
    #search-results{position:absolute;top:calc(100% + 4px);left:0;width:280px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);z-index:100;display:none;max-height:280px;overflow-y:auto;}
    .search-item{padding:10px 14px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border);}
    .search-item:last-child{border-bottom:none;}
    .search-item:hover{background:var(--bg2);}
    .search-item .s-name{font-weight:500;color:var(--text);}
    .search-item .s-years{font-size:.78rem;color:var(--text2);margin-top:2px;}
    #user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--accent2);}

    /* Main */
    #main{display:flex;flex:1;overflow:hidden;}
    #tree-container{flex:1;overflow:hidden;position:relative;background:var(--bg);}
    #tree-svg{width:100%;height:100%;cursor:grab;display:block;}
    #tree-svg:active{cursor:grabbing;}

    /* Node styles */
    .node-g{cursor:pointer;}
    .node-name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;pointer-events:none;}
    .node-years{font-family:'Inter',sans-serif;font-size:10px;pointer-events:none;}

    /* Expand button */
    .expand-btn{cursor:pointer;}
    .expand-circle{transition:fill .15s;}
    .expand-btn:hover .expand-circle{fill:var(--accent);}

    /* Panel */
    #detail-panel{width:var(--panel);border-left:1px solid var(--border);background:var(--card);overflow-y:auto;flex-shrink:0;transform:translateX(100%);transition:transform var(--tr);position:relative;}
    #detail-panel.open{transform:translateX(0);}
    #panel-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text2);}
    #panel-close:hover{color:var(--text);}
    #panel-content{padding:28px 24px 40px;}
    .panel-sex-bar{height:4px;border-radius:2px;margin-bottom:20px;}
    .panel-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px;}
    .panel-maiden{font-size:.85rem;color:var(--text2);margin-bottom:16px;}
    .panel-section{margin-top:20px;}
    .panel-label{font-size:.7rem;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
    .panel-value{font-size:.9rem;color:var(--text);line-height:1.5;}
    .panel-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
    .panel-link-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
    .panel-person-link{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--bg2);cursor:pointer;font-size:.85rem;color:var(--text);transition:background var(--tr);border:none;text-align:left;width:100%;}
    .panel-person-link:hover{background:var(--border);}
    .panel-person-link .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* Loading */
    #loading{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;}
    #loading.visible{display:flex;}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Zoom */
    #zoom-controls{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;}
    .zoom-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:border-color var(--tr);}
    .zoom-btn:hover{border-color:var(--accent);}

    /* Breadcrumb */
    #breadcrumb{position:absolute;top:12px;left:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .bc-item{font-size:.78rem;color:var(--text2);cursor:pointer;padding:3px 8px;border-radius:6px;background:var(--card);border:1px solid var(--border);transition:border-color var(--tr),color var(--tr);}
    .bc-item:hover{border-color:var(--accent);color:var(--accent);}
    .bc-sep{color:var(--text2);font-size:.78rem;}

    /* ── Mobile / PWA ────────────────────────────────────────── */
    @media (max-width: 768px) {
      #topbar { padding: 0 12px; gap: 8px; height: 50px; }
      #topbar h1 { font-size: 1rem; }
      #search-input { width: 130px; font-size: .82rem; }
      .tb-btn { padding: 5px 10px; font-size: .75rem; }
      #lineage-btn { display: none; } /* moved to fab */

      #main { flex-direction: column; }

      /* Tree takes top portion */
      #tree-container { flex: 0 0 55vh; border-bottom: 1px solid var(--border); }

      /* Panel becomes bottom drawer */
      #detail-panel {
        width: 100% !important;
        transform: translateY(100%) !important;
        transition: transform var(--tr) !important;
        border-left: none !important;
        border-top: 1px solid var(--border);
        position: fixed !important;
        bottom: 0; left: 0; right: 0;
        height: 48vh;
        z-index: 50;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px rgba(0,0,0,.15);
      }
      #detail-panel.open {
        transform: translateY(0) !important;
      }
      /* Drawer handle */
      #drawer-handle {
        display: block;
        width: 40px; height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 10px auto 0;
      }
      #panel-content { padding: 16px 20px 32px; }
      #panel-close { top: 10px; right: 14px; }

      /* Breadcrumb smaller */
      #breadcrumb { top: 8px; left: 10px; }
      .bc-item { font-size: .72rem; padding: 2px 6px; }

      /* Zoom controls smaller */
      #zoom-controls { bottom: calc(48vh + 12px); right: 12px; }
      .zoom-btn { width: 32px; height: 32px; font-size: 1rem; }

      /* Lineage FAB */
      #lineage-fab {
        display: flex;
        position: fixed;
        bottom: calc(48vh + 16px);
        left: 16px;
        z-index: 40;
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        padding: 6px 12px;
        font-size: .75rem;
        font-weight: 500;
        color: var(--text2);
        cursor: pointer;
        box-shadow: var(--shadow);
        align-items: center;
        gap: 6px;
        transition: border-color var(--tr), color var(--tr);
      }
      #lineage-fab.active { border-color: var(--accent); color: var(--accent); }

      /* Hide legend on mobile */
      #legend { display: none; }
    }
    @media (min-width: 769px) {
      #drawer-handle { display: none; }
      #lineage-fab { display: none; }
    }
  </style>
</head>
<body>

<div id="loading" class="visible">
  <div class="spinner"></div>
  <span style="color:var(--text2);font-size:.9rem;">Načítám…</span>
</div>

<div id="login-screen">
  <h1>Náš rodokmen</h1>
  <p>Soukromý archiv dvou rodin.<br>Přihlaste se svým Google účtem.</p>
  <button class="login-btn" id="google-login-btn">
    <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Přihlásit se přes Google
  </button>
  <p id="login-error"></p>
</div>

<div id="app">
  <div id="topbar">
    <h1>Rodokmen</h1>
    <div id="search-wrap">
      <input id="search-input" type="search" placeholder="Hledat osobu…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <div class="spacer"></div>
    <button class="tb-btn" id="lineage-btn">🌿 Přímá linie</button>
    <button class="tb-btn" id="theme-btn">🌙 Tmavý</button>
    <img id="user-avatar" src="" alt="" style="display:none;" />
    <button class="tb-btn" id="logout-btn">Odhlásit</button>
  </div>

  <div id="main">
    <div id="tree-container">
      <svg id="tree-svg"></svg>
      <div id="breadcrumb"></div>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-fit">⊙</button>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
    <button id="lineage-fab">🌿 Přímá linie</button>
    </div>
    <div id="detail-panel">
      <div id="drawer-handle"></div>
      <button id="panel-close">✕</button>
      <div id="panel-content"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzntGs5eNeCDyk5MW5CgI2H7VNkp_TPB0",
  authDomain: "rodokmen-15b87.firebaseapp.com",
  databaseURL: "https://rodokmen-15b87-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rodokmen-15b87",
  storageBucket: "rodokmen-15b87.firebasestorage.app",
  messagingSenderId: "115667345969",
  appId: "1:115667345969:web:25e8cfeade49f3e7736b10",
};

const ALLOWED = ["sidney4hassane@gmail.com", "krejcarovaeliska@gmail.com"];
const fbApp   = initializeApp(firebaseConfig);
const auth    = getAuth(fbApp);
const db      = getDatabase(fbApp);
const provider = new GoogleAuthProvider();

const $loading      = document.getElementById("loading");
const $loginScreen  = document.getElementById("login-screen");
const $app          = document.getElementById("app");
const $loginBtn     = document.getElementById("google-login-btn");
const $loginError   = document.getElementById("login-error");
const $logoutBtn    = document.getElementById("logout-btn");
const $themeBtn     = document.getElementById("theme-btn");
const $lineageBtn   = document.getElementById("lineage-btn");
const $searchInput  = document.getElementById("search-input");
const $searchRes    = document.getElementById("search-results");
const $avatar       = document.getElementById("user-avatar");
const $panel        = document.getElementById("detail-panel");
const $panelContent = document.getElementById("panel-content");
const $panelClose   = document.getElementById("panel-close");
const $breadcrumb   = document.getElementById("breadcrumb");

let allPersons  = {};
let allFamilies = {};
let focusId     = null;
let history     = [];   // navigation history for breadcrumb
let darkMode    = false;
let lineageMode = false;
let zoomBehavior = null;

// Node dimensions
const NW = 160, NH = 64, HGAP = 48, VGAP = 100;
const EXP_R = 12; // expand button radius

// ── Auth ──────────────────────────────────────────────────
$loginBtn.addEventListener("click", () => signInWithPopup(auth, provider).catch(()=>{}));
$logoutBtn.addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, async user => {
  if (user) {
    if (!ALLOWED.includes(user.email)) {
      $loginError.textContent = `Účet ${user.email} nemá přístup.`;
      await signOut(auth);
      $loading.classList.remove("visible");
      $loginScreen.style.display = "flex";
      return;
    }
    if (user.photoURL) { $avatar.src = user.photoURL; $avatar.style.display = "block"; }
    $loading.classList.add("visible");
    $loginScreen.style.display = "none";
    await loadData();
    $loading.classList.remove("visible");
    $app.classList.add("visible");
  } else {
    $loading.classList.remove("visible");
    $app.classList.remove("visible");
    $loginScreen.style.display = "flex";
  }
});

async function loadData() {
  const [pSnap, fSnap] = await Promise.all([
    get(ref(db, "persons")),
    get(ref(db, "families")),
  ]);
  allPersons  = pSnap.val() || {};
  allFamilies = fSnap.val() || {};
  focusId = Object.keys(allPersons).find(id => id.startsWith("R1_")) || Object.keys(allPersons)[0];
  history = [focusId];
  renderTree();
  openPanel(focusId);
}

// ── Theme ─────────────────────────────────────────────────
$themeBtn.addEventListener("click", () => {
  darkMode = !darkMode;
  document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "");
  $themeBtn.textContent = darkMode ? "☀️ Světlý" : "🌙 Tmavý";
  renderTree();
});

// ── Lineage mode ───────────────────────────────────────────
$lineageBtn.addEventListener("click", () => {
  lineageMode = !lineageMode;
  $lineageBtn.style.borderColor = lineageMode ? "var(--accent)" : "";
  $lineageBtn.style.color = lineageMode ? "var(--accent)" : "";
  $lineageBtn.textContent = lineageMode ? "🌿 Zpět na detail" : "🌿 Přímá linie";
  if (lineageMode) renderLineage();
  else renderTree();
});

// ── Search ────────────────────────────────────────────────
$searchInput.addEventListener("input", () => {
  const q = $searchInput.value.trim().toLowerCase();
  $searchRes.innerHTML = "";
  if (!q || q.length < 2) { $searchRes.style.display = "none"; return; }
  const matches = Object.entries(allPersons).filter(([, p]) =>
    `${p.given_name||""} ${p.surname||""} ${p.maiden_name||""}`.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!matches.length) { $searchRes.style.display = "none"; return; }
  matches.forEach(([id, p]) => {
    const div = document.createElement("div");
    div.className = "search-item";
    div.innerHTML = `<div class="s-name">${getDisplayName(p)}</div>
      ${p.birth_date ? `<div class="s-years">${p.birth_date.split(" ").pop()}</div>` : ""}`;
    div.addEventListener("click", () => {
      $searchInput.value = ""; $searchRes.style.display = "none";
      navigateTo(id);
    });
    $searchRes.appendChild(div);
  });
  $searchRes.style.display = "block";
});
document.addEventListener("click", e => {
  if (!document.getElementById("search-wrap").contains(e.target)) $searchRes.style.display = "none";
});

// ── Helpers ───────────────────────────────────────────────
function getDisplayName(p) {
  if (p.sex === "F" && p.maiden_name) return `${p.given_name||""} ${p.maiden_name}`.trim();
  return `${p.given_name||""} ${p.surname||""}`.trim();
}
function sexColor(sex) {
  return sex==="M" ? "var(--male)" : sex==="F" ? "var(--female)" : "var(--unknown)";
}
function getYear(dateStr) {
  if (!dateStr) return "";
  return dateStr.split(" ").pop();
}

// Get parents of a person (array of IDs)
function getParents(personId) {
  const p = allPersons[personId];
  if (!p) return [];
  const parents = [];
  (p.famc||[]).forEach(famId => {
    const fam = allFamilies[famId]; if (!fam) return;
    [fam.husband_id, fam.wife_id].filter(id => id && allPersons[id]).forEach(id => {
      if (!parents.includes(id)) parents.push(id);
    });
  });
  return parents;
}

// Get partners of a person
function getPartners(personId) {
  const p = allPersons[personId];
  if (!p) return [];
  const partners = [];
  (p.fams||[]).forEach(famId => {
    const fam = allFamilies[famId]; if (!fam) return;
    const pid = p.sex==="M" ? fam.wife_id : fam.husband_id;
    if (pid && allPersons[pid] && !partners.includes(pid)) partners.push(pid);
  });
  return partners;
}

// Get children of a person (through all families)
function getChildren(personId) {
  const p = allPersons[personId];
  if (!p) return [];
  const children = [];
  (p.fams||[]).forEach(famId => {
    const fam = allFamilies[famId]; if (!fam) return;
    (fam.children||[]).filter(cid => allPersons[cid] && !children.includes(cid))
      .forEach(cid => children.push(cid));
  });
  return children;
}

// Get siblings
function getSiblings(personId) {
  const p = allPersons[personId];
  if (!p) return [];
  const siblings = new Set();
  (p.famc||[]).forEach(famId => {
    const fam = allFamilies[famId]; if (!fam) return;
    (fam.children||[]).filter(cid => cid !== personId && allPersons[cid]).forEach(cid => siblings.add(cid));
  });
  return [...siblings];
}

// ── Build visible nodes ───────────────────────────────────
// Layout:
//   Row -2: parents of parents (grandparents) — max 4, shown if ≤4, otherwise expand button
//   Row -1: parents of focus — always shown
//   Row  0: siblings (left) | focus | partner (right)
//   Row +1: children — always shown (up to 6, rest collapsed)
//   Row +2: grandchildren of focus (collapsed by default, expand on click)

function buildVisibleNodes() {
  const focus = allPersons[focusId];
  if (!focus) return { nodes: {}, layout: [] };

  const nodes = {};  // id → node data
  const layout = []; // {id, col, row} for positioning

  function addNode(id, row, col, role) {
    if (!allPersons[id]) return;
    nodes[id] = {
      id, p: allPersons[id], row, col, role,
      parentCount:   getParents(id).length,
      childCount:    getChildren(id).length,
      partnerCount:  getPartners(id).length,
    };
    layout.push({ id, row, col });
  }

  // Focus person
  addNode(focusId, 0, 0, "focus");

  // Partners at row 0
  const partners = getPartners(focusId);
  partners.forEach((pid, i) => addNode(pid, 0, i + 1, "partner"));

  // Parents at row -1
  const parents = getParents(focusId);
  const parentCols = parents.length === 1 ? [0] : [-1, 1];
  parents.forEach((pid, i) => addNode(pid, -1, parentCols[i] ?? i, "parent"));

  // Grandparents at row -2 (parents of each parent)
  parents.forEach((pid, pi) => {
    const gps = getParents(pid);
    const baseCol = parents.length === 1 ? 0 : (pi === 0 ? -1 : 1);
    gps.forEach((gpid, gi) => {
      const col = baseCol * 2 + (gi === 0 ? -0.5 : 0.5);
      addNode(gpid, -2, col, "grandparent");
    });
  });

  // Siblings at row 0 (left of focus, max 3 shown)
  const siblings = getSiblings(focusId);
  const shownSiblings = siblings.slice(0, 3);
  shownSiblings.forEach((sid, i) => addNode(sid, 0, -(i + 1), "sibling"));

  // Children at row +1
  const children = getChildren(focusId);
  // Also children from partner
  const allChildren = [...new Set([...children, ...partners.flatMap(pid => getChildren(pid))])];
  const shownChildren = allChildren.slice(0, 6);
  const childStartCol = -Math.floor((shownChildren.length - 1) / 2);
  shownChildren.forEach((cid, i) => addNode(cid, 1, childStartCol + i, "child"));

  return { nodes, layout, siblings, allChildren, parents, partners };
}

// ── Render ────────────────────────────────────────────────
function renderTree() {
  const svg = d3.select("#tree-svg");
  svg.selectAll("*").remove();
  if (!focusId || !allPersons[focusId]) return;

  const { nodes, layout, siblings, allChildren, parents } = buildVisibleNodes();

  // Assign pixel positions
  const pos = {};
  Object.values(nodes).forEach(n => {
    pos[n.id] = {
      x: n.col * (NW + HGAP),
      y: n.row * (NH + VGAP),
    };
  });

  const container = document.getElementById("tree-container");
  const W = container.clientWidth;
  const H = container.clientHeight;

  const g = svg.append("g");
  zoomBehavior = d3.zoom().scaleExtent([.1, 2]).on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoomBehavior);

  // ── Draw edges ───────────────────────────────────────────
  // Parent → focus
  parents.forEach(pid => {
    if (!pos[pid] || !pos[focusId]) return;
    const px = pos[pid].x + NW/2, py = pos[pid].y + NH;
    const fx = pos[focusId].x + NW/2, fy = pos[focusId].y;
    const my = py + (fy - py) * 0.5;
    g.append("path").attr("fill","none")
      .attr("d", `M${px},${py} C${px},${my} ${fx},${my} ${fx},${fy}`)
      .style("stroke","var(--border)").style("stroke-width",1.5);
  });

  // Grandparent → parent
  parents.forEach(pid => {
    if (!pos[pid]) return;
    getParents(pid).forEach(gpid => {
      if (!pos[gpid]) return;
      const gx = pos[gpid].x + NW/2, gy = pos[gpid].y + NH;
      const px = pos[pid].x + NW/2,  py = pos[pid].y;
      const my = gy + (py - gy) * 0.5;
      g.append("path").attr("fill","none")
        .attr("d", `M${gx},${gy} C${gx},${my} ${px},${my} ${px},${py}`)
        .style("stroke","var(--border)").style("stroke-width",1.5);
    });
  });

  // Focus → partner (dashed horizontal)
  getPartners(focusId).forEach(pid => {
    if (!pos[pid]) return;
    const fx = pos[focusId].x + NW, fy = pos[focusId].y + NH/2;
    const px = pos[pid].x, py = pos[pid].y + NH/2;
    g.append("line").attr("fill","none")
      .attr("x1",fx).attr("y1",fy).attr("x2",px).attr("y2",py)
      .style("stroke","var(--accent2)").style("stroke-width",2).style("stroke-dasharray","6,3");
  });

  // Focus → children (curved)
  const shownChildren = allChildren.slice(0,6);
  shownChildren.forEach(cid => {
    if (!pos[cid]) return;
    const fx = pos[focusId].x + NW/2, fy = pos[focusId].y + NH;
    const cx = pos[cid].x + NW/2, cy = pos[cid].y;
    const my = fy + (cy - fy) * 0.5;
    g.append("path").attr("fill","none")
      .attr("d", `M${fx},${fy} C${fx},${my} ${cx},${my} ${cx},${cy}`)
      .style("stroke","var(--border)").style("stroke-width",1.5);
  });

  // ── Draw nodes ───────────────────────────────────────────
  Object.values(nodes).forEach(node => {
    const { id, p, role, parentCount, childCount } = node;
    if (!pos[id]) return;
    const { x, y } = pos[id];
    const isFocus = role === "focus";
    const color = sexColor(p.sex);
    const displayName = getDisplayName(p);
    const shortName = displayName.length > 19 ? displayName.slice(0,18)+"…" : displayName;
    const by = getYear(p.birth_date);
    const dy = p.death === "Y" ? "†" : getYear(p.death);
    const years = dy ? `${by}–${dy}` : by;

    const ng = g.append("g").attr("class","node-g")
      .attr("transform", `translate(${x},${y})`);

    // Card background
    ng.append("rect")
      .attr("width",NW).attr("height",NH).attr("rx",10).attr("ry",10)
      .style("fill", isFocus ? "var(--accent)" : "var(--card)")
      .style("stroke", isFocus ? "var(--accent)" : color)
      .style("stroke-width", isFocus ? 0 : 1.5)
      .style("filter","drop-shadow(0 2px 8px rgba(0,0,0,.10))")
      .on("click", () => { navigateTo(id); });

    // Sex colour bar (non-focus)
    if (!isFocus) {
      ng.append("rect").attr("width",NW).attr("height",4).attr("rx",4).attr("ry",4)
        .style("fill", color).style("pointer-events","none");
    }

    // Name
    ng.append("text").attr("class","node-name")
      .attr("x",NW/2).attr("y",28).attr("text-anchor","middle")
      .style("fill", isFocus ? "#fff" : "var(--text)")
      .text(shortName);

    // Years
    ng.append("text").attr("class","node-years")
      .attr("x",NW/2).attr("y",46).attr("text-anchor","middle")
      .style("fill", isFocus ? "rgba(255,255,255,.75)" : "var(--text2)")
      .text(years);

    // ── Expand buttons ───────────────────────────────────
    // UP arrow: show if has parents not yet visible
    const visibleParentIds = new Set(Object.keys(nodes));
    const hasHiddenParents = getParents(id).some(pid => !visibleParentIds.has(pid));
    if (hasHiddenParents || (role !== "grandparent" && parentCount > 0 && !["grandparent"].includes(role))) {
      if (role === "parent" && parentCount > 0) {
        drawExpandBtn(ng, NW/2, -EXP_R - 2, "↑", parentCount, () => navigateTo(id));
      }
    }

    // DOWN arrow: show if has children not yet visible as child nodes
    const hasHiddenChildren = role !== "child" && role !== "sibling" && role !== "grandparent" && childCount > 0
      && !["focus"].includes(role) || (role==="focus" && allChildren.length > 6);

    if (role === "child" && childCount > 0) {
      drawExpandBtn(ng, NW/2, NH + EXP_R + 2, "↓", childCount, () => navigateTo(id));
    }
    if (role === "focus" && allChildren.length > 6) {
      // Show count of hidden children
      drawExpandBtn(ng, NW + HGAP/2, NH/2, `+${allChildren.length - 6}`, allChildren.length - 6, () => {});
    }
    if (role === "partner" && childCount > 0) {
      drawExpandBtn(ng, NW/2, NH + EXP_R + 2, "↓", childCount, () => navigateTo(id));
    }
    if (role === "sibling" && (parentCount > 0 || childCount > 0)) {
      drawExpandBtn(ng, NW/2, -EXP_R - 2, "↑", parentCount, () => navigateTo(id));
    }

    // More siblings indicator
    if (role === "focus" && siblings.length > 3) {
      const hiddenSiblings = siblings.length - 3;
      const sx = -(3 + 1) * (NW + HGAP) + NW/2;
      // Already handled via sibling nodes, just note
    }
  });

  fitView(pos, W, H);
  updateBreadcrumb();
}

function drawExpandBtn(parent, cx, cy, label, count, onClick) {
  const bg = parent.append("g").attr("class","expand-btn")
    .attr("transform", `translate(${cx},${cy})`)
    .on("click", (e) => { e.stopPropagation(); onClick(); });

  bg.append("circle").attr("class","expand-circle").attr("r", EXP_R)
    .style("fill","var(--bg2)").style("stroke","var(--border)").style("stroke-width",1.5);

  bg.append("text").attr("text-anchor","middle").attr("dy","0.35em")
    .style("font-size","9px").style("font-weight","600").style("fill","var(--text2)")
    .style("pointer-events","none")
    .text(typeof label === "number" || String(label).startsWith("+") ? label : label);
}

function fitView(pos, W, H) {
  if (!Object.keys(pos).length) return;
  const xs = Object.values(pos).map(p => p.x);
  const ys = Object.values(pos).map(p => p.y);
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + NW + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + NH + 60;
  const scale = Math.min(0.9, Math.min(W/(maxX-minX), H/(maxY-minY)));
  const tx = W/2 - scale*(minX+maxX)/2;
  const ty = H/2 - scale*(minY+maxY)/2;
  d3.select("#tree-svg").call(zoomBehavior.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}


// ── Render lineage (all direct ancestors) ─────────────────
function renderLineage() {
  const svg = d3.select("#tree-svg");
  svg.selectAll("*").remove();
  if (!focusId || !allPersons[focusId]) return;

  // Collect all ancestors
  const ancestors = {};
  function climb(id, gen) {
    if (!allPersons[id] || ancestors[id]) return;
    ancestors[id] = { id, p: allPersons[id], gen };
    getParents(id).forEach(pid => climb(pid, gen + 1));
  }
  climb(focusId, 0);

  // Group by generation
  const byGen = {};
  Object.values(ancestors).forEach(n => {
    if (!byGen[n.gen]) byGen[n.gen] = [];
    byGen[n.gen].push(n);
  });

  const maxGen = Math.max(...Object.keys(byGen).map(Number));
  const pos = {};

  // Assign positions — gen 0 (focus) at bottom, maxGen at top
  for (let g = 0; g <= maxGen; g++) {
    const row = byGen[g] || [];
    const totalW = row.length * (NW + HGAP) - HGAP;
    row.forEach((n, i) => {
      pos[n.id] = {
        x: -totalW/2 + i * (NW + HGAP),
        y: -g * (NH + VGAP),
      };
    });
  }

  const container = document.getElementById("tree-container");
  const W = container.clientWidth;
  const H = container.clientHeight;

  const g = svg.append("g");
  zoomBehavior = d3.zoom().scaleExtent([.02, 2]).on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoomBehavior);

  // Generation labels
  const genLabels = { 0:"Vy", 1:"Rodiče", 2:"Prarodiče", 3:"Praprarodiče", 4:"Prapraprarodiče" };
  Object.keys(byGen).forEach(gen => {
    const y = -parseInt(gen) * (NH + VGAP);
    const label = genLabels[gen] || `Generace -${gen}`;
    g.append("text")
      .attr("x", -800).attr("y", y + NH/2 + 4)
      .attr("text-anchor","end")
      .style("font-family","Inter,sans-serif").style("font-size","11px")
      .style("fill","var(--text2)").style("font-weight","500")
      .text(label);
  });

  // Edges
  Object.values(ancestors).forEach(({ id }) => {
    getParents(id).forEach(pid => {
      if (!pos[id] || !pos[pid]) return;
      const fx = pos[id].x + NW/2,  fy = pos[id].y;
      const px = pos[pid].x + NW/2, py = pos[pid].y + NH;
      const my = py + (fy - py) * 0.5;
      g.append("path").attr("fill","none")
        .attr("d", `M${px},${py} C${px},${my} ${fx},${my} ${fx},${fy}`)
        .style("stroke","var(--border)").style("stroke-width",1.5);
    });
  });

  // Nodes
  Object.values(ancestors).forEach(({ id, p, gen }) => {
    if (!pos[id]) return;
    const { x, y } = pos[id];
    const isFocus = id === focusId;
    const color = sexColor(p.sex);
    const displayName = getDisplayName(p);
    const shortName = displayName.length > 19 ? displayName.slice(0,18)+"…" : displayName;
    const by = getYear(p.birth_date);
    const dy = p.death === "Y" ? "†" : getYear(p.death);
    const years = dy ? `${by}–${dy}` : by;

    const ng = g.append("g").attr("class","node-g")
      .attr("transform", `translate(${x},${y})`)
      .on("click", () => { lineageMode = false; $lineageBtn.style.borderColor = ""; $lineageBtn.style.color = ""; $lineageBtn.textContent = "🌿 Přímá linie"; navigateTo(id); });

    ng.append("rect")
      .attr("width",NW).attr("height",NH).attr("rx",10).attr("ry",10)
      .style("fill", isFocus ? "var(--accent)" : "var(--card)")
      .style("stroke", isFocus ? "var(--accent)" : color)
      .style("stroke-width", isFocus ? 0 : 1.5)
      .style("filter","drop-shadow(0 2px 8px rgba(0,0,0,.10))");

    if (!isFocus) {
      ng.append("rect").attr("width",NW).attr("height",4).attr("rx",4).attr("ry",4)
        .style("fill",color).style("pointer-events","none");
    }

    ng.append("text").attr("class","node-name")
      .attr("x",NW/2).attr("y",28).attr("text-anchor","middle")
      .style("fill", isFocus ? "#fff" : "var(--text)")
      .text(shortName);

    ng.append("text").attr("class","node-years")
      .attr("x",NW/2).attr("y",46).attr("text-anchor","middle")
      .style("fill", isFocus ? "rgba(255,255,255,.75)" : "var(--text2)")
      .text(years);
  });

  fitView(pos, W, H);
  updateBreadcrumb();
}

// ── Navigation ────────────────────────────────────────────
function navigateTo(id) {
  if (!allPersons[id]) return;
  // Add to history (avoid duplicates at end)
  if (history[history.length - 1] !== id) {
    history.push(id);
    if (history.length > 10) history.shift();
  }
  focusId = id;
  renderTree();
  openPanel(id);
}

// ── Breadcrumb ────────────────────────────────────────────
function updateBreadcrumb() {
  $breadcrumb.innerHTML = "";
  const shown = history.slice(-4); // last 4
  shown.forEach((id, i) => {
    const p = allPersons[id];
    if (!p) return;
    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = "bc-sep"; sep.textContent = "›";
      $breadcrumb.appendChild(sep);
    }
    const item = document.createElement("span");
    item.className = "bc-item";
    item.textContent = getDisplayName(p);
    if (id !== focusId) item.addEventListener("click", () => navigateTo(id));
    else item.style.borderColor = "var(--accent)";
    $breadcrumb.appendChild(item);
  });
}

// ── Zoom ──────────────────────────────────────────────────
document.getElementById("zoom-in").addEventListener("click",  () => d3.select("#tree-svg").call(zoomBehavior.scaleBy,1.3));
document.getElementById("zoom-out").addEventListener("click", () => d3.select("#tree-svg").call(zoomBehavior.scaleBy,0.77));
document.getElementById("zoom-fit").addEventListener("click", renderTree);

// ── Detail panel ──────────────────────────────────────────
function openPanel(id) {
  const p = allPersons[id];
  if (!p) return;
  const color = sexColor(p.sex);
  const displayName = getDisplayName(p);
  const marriedName = (p.sex==="F" && p.maiden_name) ? p.surname : null;
  const parents  = getParents(id).map(pid => ({id:pid, p:allPersons[pid]}));
  const partners = getPartners(id).map(pid => ({id:pid, p:allPersons[pid]}));
  const children = getChildren(id).map(cid => ({id:cid, p:allPersons[cid]}));
  const siblings = getSiblings(id).map(sid => ({id:sid, p:allPersons[sid]}));

  function personLink({id:lid, p:lp}) {
    return `<button class="panel-person-link" data-id="${lid}">
      <span class="dot" style="background:${sexColor(lp.sex)}"></span>
      ${getDisplayName(lp)}
      ${lp.birth_date ? `<span style="margin-left:auto;font-size:.78rem;color:var(--text2)">${getYear(lp.birth_date)}</span>` : ""}
    </button>`;
  }

  $panelContent.innerHTML = `
    <div class="panel-sex-bar" style="background:${color}"></div>
    <div class="panel-name">${displayName}</div>
    ${marriedName ? `<div class="panel-maiden">provdaná ${marriedName}</div>` : ""}
    ${p.birth_date||p.birth_place?`<div class="panel-section"><div class="panel-label">Narození</div><div class="panel-value">${[p.birth_date,p.birth_place].filter(Boolean).join(" · ")}</div></div>`:""}
    ${p.death?`<div class="panel-section"><div class="panel-label">Úmrtí</div><div class="panel-value">${p.death==="Y"?"†":p.death}</div></div>`:""}
    <hr class="panel-divider"/>
    ${parents.length?`<div class="panel-section"><div class="panel-label">Rodiče</div><div class="panel-link-list">${parents.map(personLink).join("")}</div></div>`:""}
    ${siblings.length?`<div class="panel-section"><div class="panel-label">Sourozenci (${siblings.length})</div><div class="panel-link-list">${siblings.slice(0,5).map(personLink).join("")}${siblings.length>5?`<button class="panel-person-link" style="color:var(--text2)">+ ${siblings.length-5} dalších…</button>`:""}</div></div>`:""}
    ${partners.length?`<div class="panel-section"><div class="panel-label">Partner / partnerka</div><div class="panel-link-list">${partners.map(personLink).join("")}</div></div>`:""}
    ${children.length?`<div class="panel-section"><div class="panel-label">Děti (${children.length})</div><div class="panel-link-list">${children.map(personLink).join("")}</div></div>`:""}
    <hr class="panel-divider"/>
    <div class="panel-section"><div class="panel-label">Zdroj</div><div class="panel-value">${p.source==="R1"?"Rod 1":"Rod 2"}</div></div>
  `;
  $panelContent.querySelectorAll(".panel-person-link[data-id]").forEach(btn =>
    btn.addEventListener("click", () => navigateTo(btn.dataset.id))
  );
  $panel.classList.add("open");
}

$panelClose.addEventListener("click", () => $panel.classList.remove("open"));


// ── Mobile: swipe drawer down to close ────────────────────
(function() {
  const panel = document.getElementById("detail-panel");
  let startY = 0, startScroll = 0;
  panel.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
    startScroll = panel.scrollTop;
  }, { passive: true });
  panel.addEventListener("touchmove", e => {
    const dy = e.touches[0].clientY - startY;
    if (dy > 40 && startScroll <= 0) {
      panel.classList.remove("open");
    }
  }, { passive: true });
})();

// ── Mobile: lineage FAB ───────────────────────────────────
const $lineageFab = document.getElementById("lineage-fab");
if ($lineageFab) {
  $lineageFab.addEventListener("click", () => {
    lineageMode = !lineageMode;
    const active = lineageMode;
    $lineageFab.classList.toggle("active", active);
    $lineageFab.textContent = active ? "🌿 Detail" : "🌿 Přímá linie";
    $lineageBtn.style.borderColor = active ? "var(--accent)" : "";
    $lineageBtn.style.color = active ? "var(--accent)" : "";
    $lineageBtn.textContent = active ? "🌿 Zpět na detail" : "🌿 Přímá linie";
    if (active) renderLineage();
    else renderTree();
  });
}

// ── Mobile: adjust zoom controls when drawer open/closed ──
function adjustMobileLayout() {
  if (window.innerWidth > 768) return;
  const zoomCtrl = document.getElementById("zoom-controls");
  const fab = document.getElementById("lineage-fab");
  const panel = document.getElementById("detail-panel");
  const isOpen = panel.classList.contains("open");
  const drawerH = isOpen ? window.innerHeight * 0.48 : 0;
  if (zoomCtrl) zoomCtrl.style.bottom = `${drawerH + 12}px`;
  if (fab) fab.style.bottom = `${drawerH + 16}px`;
}

document.getElementById("detail-panel").addEventListener("transitionend", adjustMobileLayout);

// ── PWA meta / viewport fix for Safari ───────────────────
// Prevent double-tap zoom on SVG
document.getElementById("tree-svg").addEventListener("touchend", e => {
  e.preventDefault();
}, { passive: false });

</script>
