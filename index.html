<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rodokmen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bg:       #FAFAF8;
      --bg2:      #F0EDE6;
      --card:     #FFFFFF;
      --border:   #E0D8CC;
      --text:     #1A1A2E;
      --text2:    #6B6470;
      --accent:   #8B6F47;
      --accent2:  #C4A882;
      --female:   #C4748A;
      --male:     #4A7FC1;
      --unknown:  #8B8B8B;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
      --shadow-lg:0 8px 32px rgba(0,0,0,.14);
      --tr:       .22s ease;
      --panel:    360px;
    }
    [data-theme="dark"] {
      --bg:       #0F0F1A;
      --bg2:      #1A1A2E;
      --card:     #1E1E30;
      --border:   #2E2E44;
      --text:     #E8E0D0;
      --text2:    #9A9090;
      --accent:   #C4A882;
      --accent2:  #8B6F47;
      --female:   #D4849A;
      --male:     #6A9FD1;
      --shadow:   0 2px 12px rgba(0,0,0,.3);
      --shadow-lg:0 8px 32px rgba(0,0,0,.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background var(--tr), color var(--tr); }

    #login-screen { display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:32px; padding:24px; }
    #login-screen h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.2rem); font-weight:700; color:var(--accent); letter-spacing:-.5px; text-align:center; }
    #login-screen p { color:var(--text2); font-size:.95rem; text-align:center; max-width:320px; line-height:1.6; }
    .login-btn { display:flex; align-items:center; gap:12px; padding:14px 28px; background:var(--card); border:1.5px solid var(--border); border-radius:50px; font-size:1rem; font-weight:500; color:var(--text); cursor:pointer; box-shadow:var(--shadow); transition:box-shadow var(--tr),transform var(--tr); }
    .login-btn:hover { box-shadow:var(--shadow-lg); transform:translateY(-1px); }
    #login-error { color:#c0392b; font-size:.88rem; text-align:center; }

    #app { display:none; height:100vh; flex-direction:column; }
    #app.visible { display:flex; }

    #topbar { display:flex; align-items:center; gap:12px; padding:0 20px; height:56px; border-bottom:1px solid var(--border); background:var(--card); box-shadow:var(--shadow); z-index:10; flex-shrink:0; }
    #topbar h1 { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--accent); font-weight:600; }
    .spacer { flex:1; }
    .tb-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:500; color:var(--text2); cursor:pointer; transition:border-color var(--tr),color var(--tr); white-space:nowrap; }
    .tb-btn:hover { border-color:var(--accent); color:var(--accent); }
    #search-wrap { position:relative; }
    #search-input { padding:7px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg2); color:var(--text); font-size:.88rem; width:200px; outline:none; transition:border-color var(--tr); }
    #search-input:focus { border-color:var(--accent); }
    #search-results { position:absolute; top:calc(100% + 4px); left:0; width:280px; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-lg); z-index:100; display:none; max-height:280px; overflow-y:auto; }
    .search-item { padding:10px 14px; cursor:pointer; font-size:.88rem; border-bottom:1px solid var(--border); }
    .search-item:last-child { border-bottom:none; }
    .search-item:hover { background:var(--bg2); }
    .search-item .s-name { font-weight:500; color:var(--text); }
    .search-item .s-years { font-size:.78rem; color:var(--text2); margin-top:2px; }
    #user-avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid var(--accent2); }

    #filterbar { display:flex; align-items:center; gap:8px; padding:8px 20px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; flex-wrap:wrap; }
    #filterbar span { font-size:.78rem; color:var(--text2); font-weight:500; margin-right:4px; }
    .filter-btn { padding:4px 14px; border-radius:20px; border:1.5px solid var(--border); font-size:.8rem; font-weight:500; background:var(--card); color:var(--text2); cursor:pointer; transition:all var(--tr); }
    .filter-btn.active, .filter-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--bg); }

    #main { display:flex; flex:1; overflow:hidden; }
    #tree-container { flex:1; overflow:hidden; position:relative; background:var(--bg); }
    #tree-svg { width:100%; height:100%; cursor:grab; display:block; }
    #tree-svg:active { cursor:grabbing; }
    .node-g { cursor:pointer; }
    .node-name { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; }
    .node-years { font-family:'Inter',sans-serif; font-size:10px; }
    .edge { fill:none; stroke-width:1.5; }

    #detail-panel { width:var(--panel); border-left:1px solid var(--border); background:var(--card); overflow-y:auto; flex-shrink:0; transform:translateX(100%); transition:transform var(--tr); position:relative; }
    #detail-panel.open { transform:translateX(0); }
    #panel-close { position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text2); }
    #panel-close:hover { color:var(--text); }
    #panel-content { padding:28px 24px 40px; }
    .panel-sex-bar { height:4px; border-radius:2px; margin-bottom:20px; }
    .panel-name { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--text); line-height:1.2; margin-bottom:4px; }
    .panel-maiden { font-size:.85rem; color:var(--text2); margin-bottom:16px; }
    .panel-section { margin-top:20px; }
    .panel-label { font-size:.7rem; font-weight:600; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
    .panel-value { font-size:.9rem; color:var(--text); line-height:1.5; }
    .panel-divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
    .panel-link-list { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
    .panel-person-link { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; background:var(--bg2); cursor:pointer; font-size:.85rem; color:var(--text); transition:background var(--tr); border:none; text-align:left; width:100%; }
    .panel-person-link:hover { background:var(--border); }
    .panel-person-link .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    #loading { display:none; position:fixed; inset:0; background:var(--bg); align-items:center; justify-content:center; z-index:100; flex-direction:column; gap:16px; }
    #loading.visible { display:flex; }
    .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #zoom-controls { position:absolute; bottom:20px; right:20px; display:flex; flex-direction:column; gap:6px; }
    .zoom-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); transition:border-color var(--tr); }
    .zoom-btn:hover { border-color:var(--accent); }

    #legend { position:absolute; bottom:20px; left:20px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:.75rem; color:var(--text2); display:flex; flex-direction:column; gap:5px; box-shadow:var(--shadow); }
    .leg-row { display:flex; align-items:center; gap:8px; }
    .leg-dot { width:10px; height:10px; border-radius:50%; }
  </style>
</head>
<body>

<div id="loading" class="visible">
  <div class="spinner"></div>
  <span style="color:var(--text2);font-size:.9rem;">Načítám…</span>
</div>

<div id="login-screen">
  <h1>Náš rodokmen</h1>
  <p>Soukromý archiv dvou rodin.<br>Přihlaste se svým Google účtem.</p>
  <button class="login-btn" id="google-login-btn">
    <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Přihlásit se přes Google
  </button>
  <p id="login-error"></p>
</div>

<div id="app">
  <div id="topbar">
    <h1>Rodokmen</h1>
    <div id="search-wrap">
      <input id="search-input" type="search" placeholder="Hledat osobu…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <div class="spacer"></div>
    <button class="tb-btn" id="reset-btn">Celý strom</button>
    <button class="tb-btn" id="theme-btn">🌙 Tmavý</button>
    <img id="user-avatar" src="" alt="" style="display:none;" />
    <button class="tb-btn" id="logout-btn">Odhlásit</button>
  </div>

  <div id="filterbar">
    <span>Zobrazit:</span>
    <button class="filter-btn active" data-filter="all">Celý strom</button>
    <button class="filter-btn" data-filter="ancestors">Přímá linie vybrané osoby</button>
    <button class="filter-btn" data-filter="r1">Rod 1</button>
    <button class="filter-btn" data-filter="r2">Rod 2</button>
  </div>

  <div id="main">
    <div id="tree-container">
      <svg id="tree-svg"></svg>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-fit">⊙</button>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
      <div id="legend">
        <div class="leg-row"><span class="leg-dot" style="background:var(--male)"></span> Muž</div>
        <div class="leg-row"><span class="leg-dot" style="background:var(--female)"></span> Žena</div>
        <div class="leg-row"><span class="leg-dot" style="background:var(--unknown)"></span> Neznámé</div>
      </div>
    </div>
    <div id="detail-panel">
      <button id="panel-close">✕</button>
      <div id="panel-content"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzntGs5eNeCDyk5MW5CgI2H7VNkp_TPB0",
  authDomain: "rodokmen-15b87.firebaseapp.com",
  databaseURL: "https://rodokmen-15b87-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rodokmen-15b87",
  storageBucket: "rodokmen-15b87.firebasestorage.app",
  messagingSenderId: "115667345969",
  appId: "1:115667345969:web:25e8cfeade49f3e7736b10",
};

const ALLOWED = ["sidney4hassane@gmail.com", "krejcarovaeliska@gmail.com"];

const fbApp    = initializeApp(firebaseConfig);
const auth     = getAuth(fbApp);
const db       = getDatabase(fbApp);
const provider = new GoogleAuthProvider();

const $loading      = document.getElementById("loading");
const $loginScreen  = document.getElementById("login-screen");
const $app          = document.getElementById("app");
const $loginBtn     = document.getElementById("google-login-btn");
const $loginError   = document.getElementById("login-error");
const $logoutBtn    = document.getElementById("logout-btn");
const $themeBtn     = document.getElementById("theme-btn");
const $resetBtn     = document.getElementById("reset-btn");
const $searchInput  = document.getElementById("search-input");
const $searchRes    = document.getElementById("search-results");
const $avatar       = document.getElementById("user-avatar");
const $panel        = document.getElementById("detail-panel");
const $panelContent = document.getElementById("panel-content");
const $panelClose   = document.getElementById("panel-close");
const $filterBtns   = document.querySelectorAll(".filter-btn");

let allPersons  = {};
let allFamilies = {};
let activeFilter = "all";
let selectedId   = null;
let darkMode     = false;
let zoomBehavior = null;

// Auth
$loginBtn.addEventListener("click", () => signInWithPopup(auth, provider).catch(() => {}));
$logoutBtn.addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, async user => {
  if (user) {
    if (!ALLOWED.includes(user.email)) {
      $loginError.textContent = `Účet ${user.email} nemá přístup.`;
      await signOut(auth);
      $loading.classList.remove("visible");
      $loginScreen.style.display = "flex";
      return;
    }
    if (user.photoURL) { $avatar.src = user.photoURL; $avatar.style.display = "block"; }
    $loading.classList.add("visible");
    $loginScreen.style.display = "none";
    await loadData();
    $loading.classList.remove("visible");
    $app.classList.add("visible");
  } else {
    $loading.classList.remove("visible");
    $app.classList.remove("visible");
    $loginScreen.style.display = "flex";
  }
});

async function loadData() {
  const [pSnap, fSnap] = await Promise.all([
    get(ref(db, "persons")),
    get(ref(db, "families")),
  ]);
  allPersons  = pSnap.val()  || {};
  allFamilies = fSnap.val()  || {};
  renderTree();
}

// Theme
$themeBtn.addEventListener("click", () => {
  darkMode = !darkMode;
  document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "");
  $themeBtn.textContent = darkMode ? "☀️ Světlý" : "🌙 Tmavý";
  renderTree();
});

// Filters
$filterBtns.forEach(btn => btn.addEventListener("click", () => {
  $filterBtns.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.filter;
  renderTree();
}));

$resetBtn.addEventListener("click", () => {
  selectedId = null;
  activeFilter = "all";
  $filterBtns.forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
  closePanel();
  renderTree();
});

// Search
$searchInput.addEventListener("input", () => {
  const q = $searchInput.value.trim().toLowerCase();
  $searchRes.innerHTML = "";
  if (!q || q.length < 2) { $searchRes.style.display = "none"; return; }
  const matches = Object.entries(allPersons).filter(([, p]) =>
    `${p.given_name || ""} ${p.surname || ""} ${p.maiden_name || ""}`.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!matches.length) { $searchRes.style.display = "none"; return; }
  matches.forEach(([id, p]) => {
    const name = getDisplayName(p);
    const year = p.birth_date ? p.birth_date.split(" ").pop() : "";
    const div = document.createElement("div");
    div.className = "search-item";
    div.innerHTML = `<div class="s-name">${name}</div>${year ? `<div class="s-years">${year}</div>` : ""}`;
    div.addEventListener("click", () => {
      $searchInput.value = "";
      $searchRes.style.display = "none";
      selectPerson(id);
    });
    $searchRes.appendChild(div);
  });
  $searchRes.style.display = "block";
});
document.addEventListener("click", e => {
  if (!document.getElementById("search-wrap").contains(e.target)) $searchRes.style.display = "none";
});

// Helpers
function getDisplayName(p) {
  if (p.sex === "F" && p.maiden_name) return `${p.given_name || ""} ${p.maiden_name}`.trim();
  return `${p.given_name || ""} ${p.surname || ""}`.trim();
}
function sexColor(sex) {
  if (sex === "M") return "var(--male)";
  if (sex === "F") return "var(--female)";
  return "var(--unknown)";
}

// Compute generational layout
function computeLayout(persons, families) {
  const ids = Object.keys(persons);
  const gen = {};
  ids.forEach(id => gen[id] = 0);

  const childrenOf = {};
  const parentsOf  = {};
  ids.forEach(id => { childrenOf[id] = []; parentsOf[id] = []; });

  Object.values(families).forEach(fam => {
    const parents  = [fam.husband_id, fam.wife_id].filter(id => id && persons[id]);
    const children = (fam.children || []).filter(id => persons[id]);
    parents.forEach(pid => {
      children.forEach(cid => {
        if (!childrenOf[pid].includes(cid)) childrenOf[pid].push(cid);
        if (!parentsOf[cid].includes(pid))  parentsOf[cid].push(pid);
      });
    });
  });

  // Propagate: parent gen = max child gen + 1
  let changed = true, iter = 0;
  while (changed && iter++ < 60) {
    changed = false;
    ids.forEach(id => {
      if (childrenOf[id].length) {
        const desired = Math.max(...childrenOf[id].map(c => gen[c])) + 1;
        if (desired > gen[id]) { gen[id] = desired; changed = true; }
      }
    });
  }

  return { gen, childrenOf, parentsOf };
}

function getFilteredIds() {
  const all = new Set(Object.keys(allPersons));
  if (activeFilter === "r1") return new Set([...all].filter(id => id.startsWith("R1_")));
  if (activeFilter === "r2") return new Set([...all].filter(id => id.startsWith("R2_")));
  if (activeFilter === "ancestors" && selectedId) return getLineage(selectedId);
  return all;
}

function getLineage(personId) {
  const ids = new Set();
  function climb(id) {
    if (ids.has(id) || !allPersons[id]) return;
    ids.add(id);
    (allPersons[id].famc || []).forEach(famId => {
      const fam = allFamilies[famId];
      if (!fam) return;
      [fam.husband_id, fam.wife_id].filter(Boolean).forEach(climb);
    });
  }
  function descend(id) {
    if (ids.has(id) || !allPersons[id]) return;
    ids.add(id);
    (allPersons[id].fams || []).forEach(famId => {
      const fam = allFamilies[famId];
      if (!fam) return;
      (fam.children || []).forEach(descend);
    });
  }
  climb(personId);
  descend(personId);
  return ids;
}

const NW = 150, NH = 56, HGAP = 24, VGAP = 70;

function renderTree() {
  const svg = d3.select("#tree-svg");
  svg.selectAll("*").remove();

  const filteredIds = getFilteredIds();
  const persons = {};
  filteredIds.forEach(id => { if (allPersons[id]) persons[id] = allPersons[id]; });
  if (!Object.keys(persons).length) return;

  const { gen, parentsOf } = computeLayout(persons, allFamilies);

  // Group by generation
  const byGen = {};
  Object.keys(persons).forEach(id => {
    const g = gen[id] ?? 0;
    if (!byGen[g]) byGen[g] = [];
    byGen[g].push(id);
  });
  const maxGen = Math.max(...Object.keys(byGen).map(Number));

  // Assign positions — oldest at top (y=0), youngest at bottom
  const pos = {};
  for (let g = 0; g <= maxGen; g++) {
    const rowIds = byGen[g] || [];
    // Sort by average parent x position for nicer alignment
    rowIds.sort((a, b) => {
      const axs = (parentsOf[a] || []).filter(p => pos[p]).map(p => pos[p].x);
      const bxs = (parentsOf[b] || []).filter(p => pos[p]).map(p => pos[p].x);
      const ax = axs.length ? axs.reduce((s, v) => s + v, 0) / axs.length : 0;
      const bx = bxs.length ? bxs.reduce((s, v) => s + v, 0) / bxs.length : 0;
      return ax - bx;
    });
    const totalW = rowIds.length * (NW + HGAP) - HGAP;
    rowIds.forEach((id, i) => {
      pos[id] = {
        x: -totalW / 2 + i * (NW + HGAP),
        y: (maxGen - g) * (NH + VGAP),
      };
    });
  }

  const container = document.getElementById("tree-container");
  const W = container.clientWidth;
  const H = container.clientHeight;

  const g = svg.append("g");
  zoomBehavior = d3.zoom().scaleExtent([.02, 2]).on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoomBehavior);

  // Draw edges
  const drawn = new Set();
  Object.values(allFamilies).forEach(fam => {
    const parents  = [fam.husband_id, fam.wife_id].filter(id => id && pos[id]);
    const children = (fam.children || []).filter(id => pos[id]);
    if (!parents.length) return;

    let dropX, dropY;

    if (parents.length === 2) {
      const [p1, p2] = parents;
      const ek = [p1, p2].sort().join("|");
      if (!drawn.has(ek)) {
        drawn.add(ek);
        const x1 = pos[p1].x + NW/2, x2 = pos[p2].x + NW/2;
        const y  = pos[p1].y + NH/2;
        g.append("line").attr("class","edge")
          .attr("x1",x1).attr("y1",y).attr("x2",x2).attr("y2",y)
          .style("stroke","var(--accent2)").style("stroke-width",2);
      }
      dropX = (pos[p1].x + NW/2 + pos[p2].x + NW/2) / 2;
      dropY = pos[p1].y + NH/2;
    } else {
      dropX = pos[parents[0]].x + NW/2;
      dropY = pos[parents[0]].y + NH;
    }

    children.forEach(cid => {
      const ck = `${fam.husband_id||""}|${fam.wife_id||""}|${cid}`;
      if (drawn.has(ck)) return;
      drawn.add(ck);
      const cx = pos[cid].x + NW/2;
      const cy = pos[cid].y;
      const my = dropY + VGAP * 0.4;
      g.append("path").attr("class","edge")
        .attr("d", `M${dropX},${dropY} L${dropX},${my} L${cx},${my} L${cx},${cy}`)
        .style("stroke","var(--border)");
    });
  });

  // Draw nodes
  Object.keys(persons).forEach(id => {
    const p = persons[id];
    const { x, y } = pos[id];
    const isSelected = id === selectedId;
    const color = sexColor(p.sex);
    const displayName = getDisplayName(p);
    const shortName = displayName.length > 18 ? displayName.slice(0,17) + "…" : displayName;
    const birthYear = p.birth_date ? p.birth_date.split(" ").pop() : "";
    const deathYear = p.death && p.death !== "Y" ? p.death.split(" ").pop() : (p.death === "Y" ? "†" : "");
    const years = deathYear ? `${birthYear}–${deathYear}` : birthYear;

    const ng = g.append("g").attr("class","node-g")
      .attr("transform", `translate(${x},${y})`)
      .on("click", () => selectPerson(id));

    ng.append("rect")
      .attr("width", NW).attr("height", NH).attr("rx",8).attr("ry",8)
      .style("fill","var(--card)")
      .style("stroke", isSelected ? "var(--accent)" : color)
      .style("stroke-width", isSelected ? 3 : 1.5)
      .style("filter", isSelected ? "drop-shadow(0 0 6px var(--accent))" : "drop-shadow(0 2px 4px rgba(0,0,0,.1))");

    ng.append("rect")
      .attr("width", NW).attr("height", 4).attr("rx",4).attr("ry",4)
      .style("fill", color);

    ng.append("text").attr("class","node-name")
      .attr("x", NW/2).attr("y", 26).attr("text-anchor","middle")
      .style("fill","var(--text)").text(shortName);

    ng.append("text").attr("class","node-years")
      .attr("x", NW/2).attr("y", 44).attr("text-anchor","middle")
      .style("fill","var(--text2)").text(years);
  });

  fitView(pos, W, H);
}

function fitView(pos, W, H) {
  if (!Object.keys(pos).length) return;
  const xs = Object.values(pos).map(p => p.x);
  const ys = Object.values(pos).map(p => p.y);
  const minX = Math.min(...xs) - 20, maxX = Math.max(...xs) + NW + 20;
  const minY = Math.min(...ys) - 20, maxY = Math.max(...ys) + NH + 20;
  const scale = Math.min(0.9, Math.min(W / (maxX - minX), H / (maxY - minY)));
  const tx = W/2 - scale*(minX + maxX)/2;
  const ty = H/2 - scale*(minY + maxY)/2;
  d3.select("#tree-svg").call(zoomBehavior.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// Zoom
document.getElementById("zoom-in").addEventListener("click",  () => d3.select("#tree-svg").call(zoomBehavior.scaleBy, 1.3));
document.getElementById("zoom-out").addEventListener("click", () => d3.select("#tree-svg").call(zoomBehavior.scaleBy, 0.77));
document.getElementById("zoom-fit").addEventListener("click", renderTree);

// Select
function selectPerson(id) {
  selectedId = id;
  renderTree();
  openPanel(id);
}

function openPanel(id) {
  const p = allPersons[id];
  if (!p) return;
  const color = sexColor(p.sex);
  const displayName = getDisplayName(p);
  const marriedName = (p.sex === "F" && p.maiden_name) ? p.surname : null;

  const partners = [], children = [], parents = [];
  (p.fams || []).forEach(famId => {
    const fam = allFamilies[famId];
    if (!fam) return;
    const pid = p.sex === "M" ? fam.wife_id : fam.husband_id;
    if (pid && allPersons[pid]) partners.push({ id: pid, p: allPersons[pid] });
    (fam.children || []).filter(cid => allPersons[cid]).forEach(cid => children.push({ id: cid, p: allPersons[cid] }));
  });
  (p.famc || []).forEach(famId => {
    const fam = allFamilies[famId];
    if (!fam) return;
    [fam.husband_id, fam.wife_id].filter(id => id && allPersons[id]).forEach(pid => parents.push({ id: pid, p: allPersons[pid] }));
  });

  function personLink({ id: lid, p: lp }) {
    return `<button class="panel-person-link" data-id="${lid}">
      <span class="dot" style="background:${sexColor(lp.sex)}"></span>${getDisplayName(lp)}
    </button>`;
  }

  $panelContent.innerHTML = `
    <div class="panel-sex-bar" style="background:${color}"></div>
    <div class="panel-name">${displayName}</div>
    ${marriedName ? `<div class="panel-maiden">provdaná ${marriedName}</div>` : ""}
    ${p.birth_date||p.birth_place ? `<div class="panel-section"><div class="panel-label">Narození</div><div class="panel-value">${[p.birth_date,p.birth_place].filter(Boolean).join(" · ")}</div></div>` : ""}
    ${p.death ? `<div class="panel-section"><div class="panel-label">Úmrtí</div><div class="panel-value">${p.death==="Y"?"†":p.death}</div></div>` : ""}
    <hr class="panel-divider" />
    ${parents.length  ? `<div class="panel-section"><div class="panel-label">Rodiče</div><div class="panel-link-list">${parents.map(personLink).join("")}</div></div>` : ""}
    ${partners.length ? `<div class="panel-section"><div class="panel-label">Partner / partnerka</div><div class="panel-link-list">${partners.map(personLink).join("")}</div></div>` : ""}
    ${children.length ? `<div class="panel-section"><div class="panel-label">Děti (${children.length})</div><div class="panel-link-list">${children.map(personLink).join("")}</div></div>` : ""}
    <div class="panel-section"><div class="panel-label">Zdroj</div><div class="panel-value">${p.source==="R1"?"Rod 1":"Rod 2"}</div></div>
  `;
  $panelContent.querySelectorAll(".panel-person-link").forEach(btn =>
    btn.addEventListener("click", () => selectPerson(btn.dataset.id))
  );
  $panel.classList.add("open");
}

function closePanel() { $panel.classList.remove("open"); selectedId = null; }
$panelClose.addEventListener("click", closePanel);
</script>
</body>
</html>
